name: deploy and publish

concurrency:
  group: "deploy"
  cancel-in-progress: false

on:
  release:
    types: [created]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
      - run: npm ci
      - name: build package
        run: npm run build
      - name: publish package
        run: npm publish
